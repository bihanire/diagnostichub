services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-relational_encyclopedia}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-relational_encyclopedia}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      OPS_AUTH_ENABLED: ${OPS_AUTH_ENABLED:-true}
      OPS_SHARED_PASSWORD: ${OPS_SHARED_PASSWORD}
      OPS_SESSION_SECRET: ${OPS_SESSION_SECRET}
      OPS_SESSION_TTL_HOURS: ${OPS_SESSION_TTL_HOURS:-8}
      OPS_COOKIE_NAME: ${OPS_COOKIE_NAME:-rel_ops_session}
      OPS_COOKIE_SECURE: ${OPS_COOKIE_SECURE:-true}
      API_META_ENABLED: ${API_META_ENABLED:-true}
      API_VERSION: ${API_VERSION:-1.0.0}
      SCHEMA_VERSION: ${SCHEMA_VERSION:-1}
      BUILD_SHA: ${BUILD_SHA:-dev}
      REQUEST_CORRELATION_ENABLED: ${REQUEST_CORRELATION_ENABLED:-true}
      STANDARDIZE_ERROR_RESPONSES: ${STANDARDIZE_ERROR_RESPONSES:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${FRONTEND_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_ENABLE_SERVICE_WORKER: ${FRONTEND_ENABLE_SERVICE_WORKER:-false}
        NEXT_PUBLIC_BOOT_HANDSHAKE_ENABLED: ${FRONTEND_BOOT_HANDSHAKE_ENABLED:-true}
        NEXT_PUBLIC_BOOT_HANDSHAKE_TIMEOUT_MS: ${FRONTEND_BOOT_HANDSHAKE_TIMEOUT_MS:-5000}
        NEXT_PUBLIC_ENFORCE_API_GATEWAY: ${FRONTEND_ENFORCE_API_GATEWAY:-true}
        NEXT_PUBLIC_API_VERSION_CHECK_ENABLED: ${FRONTEND_API_VERSION_CHECK_ENABLED:-true}
        NEXT_PUBLIC_EXPECTED_API_VERSION: ${FRONTEND_EXPECTED_API_VERSION:-1.0.0}
        NEXT_PUBLIC_CLIENT_REQUEST_ID_ENABLED: ${FRONTEND_CLIENT_REQUEST_ID_ENABLED:-true}
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${FRONTEND_PUBLIC_API_BASE_URL:-/api}
      NEXT_PUBLIC_ENABLE_SERVICE_WORKER: ${FRONTEND_ENABLE_SERVICE_WORKER:-false}
      NEXT_PUBLIC_BOOT_HANDSHAKE_ENABLED: ${FRONTEND_BOOT_HANDSHAKE_ENABLED:-true}
      NEXT_PUBLIC_BOOT_HANDSHAKE_TIMEOUT_MS: ${FRONTEND_BOOT_HANDSHAKE_TIMEOUT_MS:-5000}
      NEXT_PUBLIC_ENFORCE_API_GATEWAY: ${FRONTEND_ENFORCE_API_GATEWAY:-true}
      NEXT_PUBLIC_API_VERSION_CHECK_ENABLED: ${FRONTEND_API_VERSION_CHECK_ENABLED:-true}
      NEXT_PUBLIC_EXPECTED_API_VERSION: ${FRONTEND_EXPECTED_API_VERSION:-1.0.0}
      NEXT_PUBLIC_CLIENT_REQUEST_ID_ENABLED: ${FRONTEND_CLIENT_REQUEST_ID_ENABLED:-true}
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
