# DiagHub Apache reverse proxy template (LAN HTTP mode)
# Place in: /etc/apache2/sites-available/diaghub.watuafrica.co.ug.conf

<VirtualHost *:80>
    ServerName diaghub.watuafrica.co.ug
    ServerAdmin ops@watuafrica.co.ug

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyTimeout 120
    # Prevent browser basic-auth popups. Ops auth is handled in-app on /ops/login.
    Header always unset WWW-Authenticate

    # Keep upstream aware this deployment is HTTP-only.
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"

    # Backend API
    ProxyPass        /api/ http://127.0.0.1:8000/
    ProxyPassReverse /api/ http://127.0.0.1:8000/

    # Frontend application shell
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/diaghub-error.log
    CustomLog ${APACHE_LOG_DIR}/diaghub-access.log combined
</VirtualHost>
