name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: python -m unittest discover -s backend/tests -p "test_*.py" -v

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Run frontend production build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: "/api"
          NEXT_PUBLIC_ENABLE_SERVICE_WORKER: "false"
          NEXT_PUBLIC_BOOT_HANDSHAKE_ENABLED: "true"
          NEXT_PUBLIC_BOOT_HANDSHAKE_TIMEOUT_MS: "5000"
          NEXT_PUBLIC_ENFORCE_API_GATEWAY: "true"
          NEXT_PUBLIC_API_VERSION_CHECK_ENABLED: "true"
          NEXT_PUBLIC_EXPECTED_API_VERSION: "1.0.0"
          NEXT_PUBLIC_CLIENT_REQUEST_ID_ENABLED: "true"
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t relational-encyclopedia-backend ./backend

      - name: Build frontend image
        run: >
          docker build
          --build-arg NEXT_PUBLIC_API_BASE_URL=/api
          --build-arg NEXT_PUBLIC_ENABLE_SERVICE_WORKER=false
          --build-arg NEXT_PUBLIC_BOOT_HANDSHAKE_ENABLED=true
          --build-arg NEXT_PUBLIC_BOOT_HANDSHAKE_TIMEOUT_MS=5000
          --build-arg NEXT_PUBLIC_ENFORCE_API_GATEWAY=true
          --build-arg NEXT_PUBLIC_API_VERSION_CHECK_ENABLED=true
          --build-arg NEXT_PUBLIC_EXPECTED_API_VERSION=1.0.0
          --build-arg NEXT_PUBLIC_CLIENT_REQUEST_ID_ENABLED=true
          -t relational-encyclopedia-frontend ./frontend

      - name: Validate docker compose configuration
        run: docker compose --env-file .env.compose.example config
