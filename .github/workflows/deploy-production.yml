name: deploy-production

on:
  workflow_run:
    workflows:
      - ci
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger server-side deployment worker
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_SSH_HOST:-}" ] || [ -z "${PROD_SSH_USER:-}" ] || [ -z "${PROD_SSH_PRIVATE_KEY:-}" ]; then
            echo "Required secrets are missing: PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_PRIVATE_KEY"
            exit 1
          fi

          SSH_PORT="${PROD_SSH_PORT:-22}"

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "$SSH_PORT" -H "$PROD_SSH_HOST" >> "$HOME/.ssh/known_hosts"

          ssh -p "$SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "sudo /opt/diaghub/bin/deploy.sh --source github-actions"

          ssh -p "$SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "sudo tail -n 120 /var/log/diaghub-deploy.log || true"
